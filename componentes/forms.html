<!-- Selector de Tipo de Operación -->
<div class="flex bg-slate-50 p-1.5 border-b border-slate-100">
    <button id="tab-btn-gasto" class="w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 bg-white text-rose-600 shadow-sm flex justify-center items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-rose-500"></span> Registrar Gasto
    </button>
    <button id="tab-btn-presupuesto" class="w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800 flex justify-center items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-transparent"></span> Definir Límite
    </button>
</div>

<div class="p-6">
    <!-- FORMULARIO 1: REGISTRAR GASTO -->
    <form id="form-gasto" class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nombre del Gasto</label>
            <input type="text" id="gasto-nombre" required placeholder="Ej. Supermercado, Gasolina..." class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all text-sm">
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Categoría</label>
                <select id="gasto-tipo" class="w-full rounded-xl border border-slate-200 p-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 text-sm">
                    <option value="Comida">Comida</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Entretenimiento">Entretenimiento</option>
                    <option value="Servicios">Servicios</option>
                    <option value="Vivienda">Vivienda</option>
                    <option value="Utensilios">Utensilios</option>
                    <option value="Educación">Educación</option>
                    <option value="Suscripciones">Suscripciones</option>
                    <option value="Salud">Salud</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Frecuencia</label>
                <select id="gasto-periodo" class="w-full rounded-xl border border-slate-200 p-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 text-sm">
                    <option value="Semanal">Semanal</option>
                    <option value="Mensual" selected>Mensual</option>
                    <option value="Anual">Anual</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Monto ($)</label>
                <input type="number" step="0.01" id="gasto-monto" placeholder="0.00" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 text-sm">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Fecha de Transacción</label>
            <input type="date" id="gasto-fecha" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 text-sm">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Notas / Detalle</label>
            <textarea id="gasto-detalle" rows="2" placeholder="Información opcional..." class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 text-sm"></textarea>
        </div>
        <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-rose-600/10 hover:shadow-lg transition duration-200 text-sm flex justify-center items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Guardar Gasto
        </button>
    </form>

    <!-- FORMULARIO 2: ESTABLECER PRESUPUESTO (Oculto por defecto) -->
    <form id="form-presupuesto" class="space-y-4 hidden">
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nombre del Presupuesto</label>
            <input type="text" id="pres-nombre" required placeholder="Ej. Presupuesto Comida, Límite Ocio..." class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Periodo Límite</label>
                <select id="pres-tipo" class="w-full rounded-xl border border-slate-200 p-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 text-sm">
                    <option value="Semanal">Semanal</option>
                    <option value="Mensual" selected>Mensual</option>
                    <option value="Anual">Anual</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Monto Límite ($)</label>
                <input type="number" step="0.01" id="pres-monto" placeholder="0.00" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 text-sm">
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Fecha de Inicio</label>
            <input type="date" id="pres-fecha" required class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 text-sm">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Notas / Detalle</label>
            <textarea id="pres-detalle" rows="2" placeholder="Propósito de este presupuesto..." class="w-full rounded-xl border border-slate-200 px-3 py-2.5 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 text-sm"></textarea>
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md shadow-emerald-600/10 hover:shadow-lg transition duration-200 text-sm flex justify-center items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg> Establecer Límite
        </button>
    </form>
</div>
