<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Presupuestario - ISF-251</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Sistema de Control Presupuestario</h1>
            <span class="text-sm bg-blue-700 px-3 py-1 rounded">Proyecto Semestral</span>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        
        <h2 class="text-lg font-bold text-gray-700 mb-4">Indicadores de Toma de Decisiones</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Presupuesto Total</p>
                <p id="total-presupuesto" class="text-2xl font-bold text-gray-800">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Gastos Totales</p>
                <p id="total-gastos" class="text-2xl font-bold text-gray-800">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Balance Actual</p>
                <p id="balance-actual" class="text-2xl font-bold text-gray-800">$0.00</p>
            </div>
            <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-purple-500 flex flex-col justify-between">
                <p class="text-sm text-gray-500 uppercase font-semibold">Estado de Flujo</p>
                <span id="estado-presupuesto" class="w-max px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-800">Cargando...</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-lg font-bold text-red-600 mb-4 border-b pb-2">Registrar Nuevo Gasto</h3>
                <form id="form-gasto" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nombre del Gasto</label>
                        <input type="text" id="gasto-nombre" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tipo/Categoría</label>
                            <select id="gasto-tipo" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                                <option value="Comida">Comida</option>
                                <option value="Transporte">Transporte</option>
                                <option value="Entretenimiento">Entretenimiento</option>
                                <option value="Servicios">Servicios</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Monto ($)</label>
                            <input type="number" step="0.01" id="gasto-monto" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha</label>
                        <input type="date" id="gasto-fecha" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Detalle</label>
                        <textarea id="gasto-detalle" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200">Guardar Gasto</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-lg font-bold text-green-600 mb-4 border-b pb-2">Establecer Presupuesto</h3>
                <form id="form-presupuesto" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nombre del Presupuesto</label>
                        <input type="text" id="pres-nombre" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Periodo</label>
                            <select id="pres-tipo" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                                <option value="Semanal">Semanal</option>
                                <option value="Mensual">Mensual</option>
                                <option value="Anual">Anual</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Monto Límite ($)</label>
                            <input type="number" step="0.01" id="pres-monto" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha de Inicio</label>
                        <input type="date" id="pres-fecha" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Detalle / Notas</label>
                        <textarea id="pres-detalle" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition duration-200">Establecer Límite</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // 🚨 CONFIGURACIÓN: Reemplaza esto con la URL de tu API Gateway (debe terminar en /dev o la etapa que creaste)
        const API_BASE_URL = 'https://us54vdx1if.execute-api.us-east-1.amazonaws.com/dev'; 

        // Función para cargar los datos e indicadores en tiempo real (GET)
        async function actualizarResumen() {
            try {
                const response = await fetch(`${API_BASE_URL}/resumen`);
                if (!response.ok) throw new Error('Error al consultar datos');
                
                const data = await response.json();
                const ind = data.indicadores;

                // Actualizar textos en la interfaz
                document.getElementById('total-presupuesto').innerText = `$${parseFloat(ind.total_presupuesto || 0).toFixed(2)}`;
                document.getElementById('total-gastos').innerText = `$${parseFloat(ind.total_gastos || 0).toFixed(2)}`;
                
                const balance = parseFloat(ind.balance_actual || 0);
                const balanceEl = document.getElementById('balance-actual');
                balanceEl.innerText = `$${balance.toFixed(2)}`;

                // Color dinámico según el saldo
                if (balance < 0) {
                    balanceEl.className = "text-2xl font-bold text-red-600";
                } else {
                    balanceEl.className = "text-2xl font-bold text-green-600";
                }

                // Actualizar etiqueta del estado de flujo
                const estadoEl = document.getElementById('estado-presupuesto');
                estadoEl.innerText = ind.estado_presupuesto;
                
                if (ind.estado_presupuesto === 'Excedido') {
                    estadoEl.className = "w-max px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-800";
                } else if (ind.estado_presupuesto === 'Cumplido') {
                    estadoEl.className = "w-max px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-800";
                } else {
                    estadoEl.className = "w-max px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-800";
                }

            } catch (err) {
                console.error("Error al cargar el resumen:", err);
            }
        }

        // Manejar el envío del formulario de GASTOS (POST)
        document.getElementById('form-gasto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                Nombre: document.getElementById('gasto-nombre').value,
                Tipo: document.getElementById('gasto-tipo').value,
                Monto: parseFloat(document.getElementById('gasto-monto').value),
                Fecha: document.getElementById('gasto-fecha').value,
                Detalle: document.getElementById('gasto-detalle').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/gasto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    alert('¡Gasto guardado en DynamoDB exitosamente!');
                    document.getElementById('form-gasto').reset();
                    actualizarResumen(); // Actualiza los balances
                }
            } catch (err) {
                alert('Error al conectar con API Gateway');
            }
        });

        // Manejar el envío del formulario de PRESUPUESTOS (POST)
        document.getElementById('form-presupuesto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                Nombre: document.getElementById('pres-nombre').value,
                Tipo: document.getElementById('pres-tipo').value,
                Monto: parseFloat(document.getElementById('pres-monto').value),
                Fecha: document.getElementById('pres-fecha').value,
                Detalle: document.getElementById('pres-detalle').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/presupuesto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    alert('¡Presupuesto establecido exitosamente!');
                    document.getElementById('form-presupuesto').reset();
                    actualizarResumen(); // Actualiza los balances
                }
            } catch (err) {
                alert('Error al conectar con API Gateway');
            }
        });

        // Al cargar la página, traer datos inmediatamente
        window.onload = actualizarResumen;
    </script>
</body>
</html>
