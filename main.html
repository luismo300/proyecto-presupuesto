<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Presupuestario - ISF-251</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <!-- COMPONENTE: BARRA SUPERIOR -->
    <div id="componente-navbar"></div>

    <!-- CONTENEDOR FLOTANTE PARA TOASTS -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <div class="container mx-auto px-4 md:px-6 mt-8 max-w-7xl">
        
        <!-- COMPONENTE: INDICADORES EN TIEMPO REAL -->
        <div id="componente-indicadores"></div>

        <!-- SECCIÓN CENTRAL DE TRABAJO -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            
            <!-- COMPONENTE: FORMULARIOS (Gasto y Presupuesto) -->
            <div id="componente-formularios" class="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"></div>

            <!-- COMPONENTE: VISOR DE HISTORIAL Y ANALÍTICAS -->
            <div id="componente-visor" class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between"></div>

        </div>
    </div>

    <!-- Carga del script principal con lógica modular -->
    <script src="script.js"></script>
</body>
</html>
